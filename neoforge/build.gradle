plugins {
	id "com.gradleup.shadow" version "9.3.0"
}

architectury {
	platformSetupLoomIde()
	neoForge()
}

configurations {
	common
	shadowCommon // Don't use shadow from the shadow plugin because we don't want IDEA to index this.
	compileClasspath.extendsFrom common
	runtimeClasspath.extendsFrom common
	developmentNeoForge.extendsFrom common
}

dependencies {
	neoForge "net.neoforged:neoforge:${rootProject.neoforge_version}"

	common(project(path: ":common")) { transitive false }
	shadowCommon(project(path: ":common", configuration: "transformProductionNeoForge")) { transitive = false }

	minecraft "com.mojang:minecraft:${rootProject.minecraft_version}"

	implementation "org.xerial:sqlite-jdbc:3.47.0.0"
	shadowCommon "org.xerial:sqlite-jdbc:3.47.0.0"
}

processResources {
	inputs.property "version", project.version

	filesMatching("META-INF/neoforge.mods.toml") {
		expand (
				[
						"version": project.version,
						"minecraft_version": project.minecraft_version,
						"neoforge_version": project.neoforge_version
				]
		)
	}
}

shadowJar {
	exclude "fabric.mod.json"
	exclude "architectury.common.json"

	dependsOn(jar)
	mainSpec.sourcePaths.clear()       // Remove default source set inclusion
	from(zipTree(jar.archiveFile))     // Unpack jar output (preserves Loom modifications)

	configurations = [project.configurations.shadowCommon]
	archiveClassifier = "neoforge"
	from rootProject.file("LICENSE.txt")
}

jar {
	archiveClassifier = "dev"
}

sourcesJar {
	def commonSources = project(":common").sourcesJar
	dependsOn commonSources
	from commonSources.archiveFile.map { zipTree(it) }
}

components.java {
	withVariantsFromConfiguration(project.configurations.shadowRuntimeElements) {
		skip()
	}
}

publishing {
	publications {
		mavenForge(MavenPublication) {
			artifactId = rootProject.archives_base_name + "-" + project.name
			from components.java
		}
	}

	// See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
	repositories {
		// Add repositories to publish to here.
	}
}

tasks.register('cleanJar', Delete) {
	delete fileTree('../dist') {
		include "*-neoforge.jar"
	}
}

tasks.register('copyJar', Copy) {
	from shadowJar
	into '../dist'
}

build.dependsOn copyJar
copyJar.dependsOn cleanJar
